<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Application For The Job</h1>
    <form>
        <fieldset>
            <legend>Personal Information</legend>
    <label for="Name">Name</label>
    <br>
        <input type="text" name="name" id="name" placeholder="Enter your Name">
        <br> <br>
        <label for="email">Email</label>
        <br>
        <input type="email" name="email" id="email" placeholder="abc@gmail.com" required>
        <br><br>
        <label for="contact">Contact Number</label>
        <br>
        <input type="tel" name="contact" id="contact" placeholder="Enter your Contact Number" required>
        <br><br>
        <label for="address">Address</label>
        <br>
        <input type="text" name="address" id="address" placeholder="Enter your Address">
        <br><br>
        <label for="province">Province</label>
        <br>
        <select name="province" id="Province">
            <option value="Province 1">Koshi</option>
            <option value="Province 2">Madhesh</option>
            <option value="Province 3">Bagmati</option>
            <option value="Province 4">Gandaki</option>
            <option value="Province 5">Lumbini</option>
            <option value="Province 6">Karnali</option>
            <option value="Province 7">Sudurpaschim</option>
            </select>
            <br><br>


        <label for="gender">Gender</label>
        <br>
        <input type="radio" name="Gender" id="male" value="male">
        <label for="male">Male</label>
        <br>
        <input type="radio" name="Gender" id="female" value="female">
        <label for="female">Female</label>
        <br><br>
        <label for="Educational Qualification">Educational Qualification</label>
        <br>
        <select name="Educational Qualification" id="Educational Qualification">
            <option value="SEE/SLC">SEE/SLC</option>
            <option value="Intermediate">Intermediate</option>
            <option value="Bachelor level">Bachelor Level</option>
            <option value="Masters">Masters</option>
            <option value="M.Phil">M.Phil</option>
            <option value="PHD">PHD</option>
            <br><br>
        </select>
        <br><br>
        <label for="skills">Skills</label>
        <br>
        <input type="checkbox" name="skills" id="python" value="python">
        <label for="">Python</label>
        <br>
        <input type="checkbox" name="skills" id="database" value="database">
        <label for="">Database</label>
        <br>
        <input type="checkbox" name="skills" id="networking" value="networking">
        <label for="">Networking</label>
        <br><br>
        <label for="experience">Experience</label>
        <br>
        <select name="Experience" id="Experience">
            <option value=" Less than 1 year"> Less than 1 Year</option>
            <option value="1 year">1 Year</option>
            <option value=" 2 years">2 Years</option>
            <option value="5 years">5 Years</option>
            <option value=" 10 years">10 Years</option>
            <option value="More than 10 years">More than 10 Years</option>

        </select>
        <br><br>
        <label for="Company">Company</label>
        <br>
        <input type="text" name="Company" id="Company" placeholder="Enter your ex company name">
        <br><br>
        <label for="CV">CV</label>
        <br>
        <input type="file" name="cv" id=""multiple accept=".png">
        <br><br>
        <label for="Cover letter">Cover Letter</label>
        <br>
        <input type="file" name="" id=""multiple accept=".png">
        <br><br>
        <body style="background-color:orange;"></body>
        <br><br>


        <button type="submit">Submit</button>
    </form>
    </fieldset>
</body>
</html>
