<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width: 100px;
            height: 100px;
            background-color: orange;

            /* Syntax:
            transition:property duration transition-timing-function delay:; */

            transition: background-color, display 4s allow-discrete;
        

        }

        .box:hover{
            background-color: aqua;
        }

        /*multiple transition */
        .box1{
            width: 100px;
            height: 100px;
            background-color: violet;
            transition: width 2s linear, height 2s ease-out, background-color 2s ease-in 1s;
        }

        .box1:hover{
            width: 200px;
            height: 200px;
            background-color: indigo;
        }

    </style>
</head>
<body>
    <h1>Transition Style</h1>
    <h3>Individual Transition</h3>

    <div class="box">

    </div>

    <h3>Multiple Transition</h3>
    <div class="box1">

    </div>
</body>
</html>
