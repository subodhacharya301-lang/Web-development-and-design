<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../CSS/boxmodel.css">
</head>
<body>
    <h1>Box Model</h1>
    <hr>
    <!--content and border bichko gap is padding
    Syntax:
    padding-left:unit;
    padding-top:unit;
    padding-right:unit;
    padding-bottom:unit;
    Short-hand:
    Padding:unitItop-bottom) unit (right-left)
    padding:unit(all sides)-->
    
    <div class="padding">
         <p>Box Number 1</p>
    </div>
   <br>
   <!--top right bottom left-->
   <div class="box" style="padding:50px 0px 0px 40px">
    <p>Box A</p>
   </div>
   <br>
   <div class="box" style="padding:50px 0px 50px 0px">
    <p>Box B</p>
   </div>
   <br>
   <div class="box">
    <p>Box C</p>
    
   </div>
   <br>
    <hr>
    <h3>Margin</h3>
    <!--Margin is a space between the elements.
    Syntax:
    margin-top:unit;
    margin-right:unit;
    margin-bottom:unit;
    short-hand:
    Padding:unitItop-bottom) unit (right-left)
    padding:unit(all sides)

    -->
    <div class="margin" style="margin-bottom:50px">
        <p>Box 2</p>

    </div>
    <br>
    <div class="margin">
        <p>Box 3</p>
    </div>
    <br>
    <hr>

<!--OUTLINE is border bahira ko line
syntax:
outline:size style color;
outline-offset:unit(for the space between outline and border)-->
<h3>Outline</h3>
<p id="outline">Border Outline</p>




</body>
</html>
