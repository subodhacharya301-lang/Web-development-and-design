    <!--Block level tag vs inline tag
    Block level covers the space of a block. If the tag is block-level element then it appears in new line.eg:div,h1,h2,h3,h4,h5,h6,p
    
    Inline Tag-covers the space of the element.If the tag is inline element then it appears in the same line.
    eg:img,span,input,etc.   inline ma height and width dina mildaina ut inline-block ma milxa-->
    <hr>

    <h3>Inline</h3>
    <p class="inline">
        <span>Text1</span>
        <span>Text2</span>
        <span>Text3</span>
    </p>
    <hr>
    <h3>Inline-Block</h3>
    <p class="inline-block">
        <span>Text1</span>
        <span>Text2</span>
        <span>Text3</span>
        </p>
    <hr>
    <h3>Block</h3>
    <p class="block">
        <span style="display:block">Text1</span>
        <span>Text2</span>
        <span>Text3</span>
        </p>
    <hr>
    <h3>None</h3>
    <p class="none">
              <span>Text1</span>
      
        <span>Text2</span>
        <span>Text3</span>
        </p>
    <hr>


    <!--
    display: 
    inline-block: converts block-level element to inline and has height and width property(unlike inline)
    none:hides the element
    inline:width and height wont work here-->
